name: Daily ComfyUI build

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cuda_version: [ "13.0-cudnn9" ]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: nvidia-sm120
      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Run build script
        run: |
          cd ./comfyui
          export COMFYUI_BRANCH="$(curl -L \
            -H "Accept: application/vnd.github+json" \
            'https://api.github.com/repos/Comfy-Org/ComfyUI/releases?per_page=1' | yq -r '.[0].tag_name')"
          export COMFYUI_CUDA_VERSION='${{ matrix.rocm_version }}'
          export COMFYUI_PYTORCH_VERSION='2.11.0'
          ./build-and-push.comfyui.sh
